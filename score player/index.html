<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽譜 × YouTube 連動アプリ</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { background: #16213e; padding: 8px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #0f3460; flex-shrink: 0; }
header h1 { font-size: 15px; color: #e94560; }
.main { display: flex; flex: 1; overflow: hidden; gap: 5px; padding: 5px; }

/* Panel base */
.panel { background: #16213e; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
.ph { background: #0f3460; padding: 7px 10px; font-size: 11px; font-weight: bold; color: #aac; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; gap: 4px; user-select: none; }
.collapse-btn { background: #1a4a8a; border: none; color: #fff; cursor: pointer; font-size: 13px; padding: 2px 5px; transition: transform .3s; flex-shrink: 0; border-radius: 3px; min-width: 22px; min-height: 22px; }
.collapse-btn.collapsed { transform: rotate(-90deg); }

/* Panel 1: PDF */
#p1 { width: 220px; flex-shrink: 0; transition: width .3s; }
#p1.collapsed { width: 32px; min-width: 32px; }
#p1.collapsed #p1-body { display: none; }
#p1.collapsed .ph { padding: 6px 4px; justify-content: center; }
#p1.collapsed #p1-label { display: none; }
#p1-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
#pdf-toolbar { display: flex; gap: 4px; padding: 5px; border-bottom: 1px solid #0f3460; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
#pdf-toolbar button { padding: 3px 7px; border: none; border-radius: 3px; font-size: 9px; cursor: pointer; }
#btn-sort-name { background: #1a4a8a; color: #fff; }
#btn-sort-date { background: #0f3460; color: #aac; }
#btn-check-all { background: #2a6a2a; color: #fff; }
#btn-uncheck-all { background: #4a1a1a; color: #fff; }
#btn-reload-drive { background: #e94560; color: #fff; }
#pdf-list { flex: 1; overflow-y: auto; padding: 4px; display: flex; flex-direction: column; gap: 2px; }
.pdf-item { background: #0f3460; border-radius: 5px; padding: 6px 8px; cursor: pointer; border: 2px solid transparent; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.pdf-item:hover { background: #1a4a8a; }
.pdf-item.active { border-color: #e94560; background: #1a2a5a; }
.pdf-check { width: 14px; height: 14px; accent-color: #e94560; cursor: pointer; flex-shrink: 0; }
.pdf-dot { width: 9px; height: 9px; border-radius: 50%; background: #334; flex-shrink: 0; transition: background .3s; border: 1px solid #445; }
.pdf-dot.lit { background: #4caf50; box-shadow: 0 0 5px #4caf50; border-color: #4caf50; }
.pdf-item-name { font-size: 11px; color: #ddf; line-height: 1.3; word-break: break-all; flex: 1; }
.pdf-new-badge { font-size: 8px; background: #e94560; color: #fff; border-radius: 3px; padding: 1px 4px; flex-shrink: 0; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.hint { color: #446; font-size: 10px; text-align: center; padding: 16px 8px; line-height: 1.8; }

/* Panel 2: YouTube */
#p2 { width: 275px; flex-shrink: 0; transition: width .3s; }
#p2.collapsed { width: 32px; min-width: 32px; }
#p2.collapsed #p2-body { display: none; }
#p2.collapsed .ph { padding: 6px 4px; justify-content: center; }
#p2.collapsed #p2-label { display: none; }
#p2-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
#yt-wrap { flex-shrink: 0; background: #000; }
#yt-wrap iframe { display: block; }
.now-bar { font-size: 9px; color: #ff9; padding: 3px 7px; background: #0a0005; min-height: 20px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#yt-ctrl { display: flex; gap: 4px; padding: 5px; background: #080818; flex-shrink: 0; }
#yt-ctrl button { flex: 1; padding: 5px 2px; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
#btn-play   { background: #e94560; color: #fff; }
#btn-prev-t { background: #1a4a8a; color: #fff; }
#btn-next-t { background: #1a4a8a; color: #fff; }
#btn-stop   { background: #444;    color: #fff; }
#pl-area { padding: 6px; border-top: 1px solid #0f3460; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
#pl-area input { width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #0f3460; background: #080818; color: #eee; font-size: 10px; }
#pl-area input::placeholder { color: #446; }
#btn-add { padding: 5px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
#pl-status { font-size: 9px; color: #aac; min-height: 13px; text-align: center; }
#yt-vlist { flex: 1; overflow-y: auto; padding: 5px; display: flex; flex-direction: column; gap: 4px; }
.pl-header { font-size: 9px; color: #e94560; padding: 4px 4px 2px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; gap: 4px; }
.pl-del { background: none; border: 1px solid #e94560; color: #e94560; border-radius: 3px; font-size: 8px; padding: 1px 5px; cursor: pointer; flex-shrink: 0; }
.pl-del:hover { background: #e94560; color: #fff; }
.vi { display: flex; gap: 5px; align-items: center; background: #0f3460; border-radius: 5px; padding: 4px; cursor: pointer; border: 2px solid transparent; transition: all .15s; }
.vi:hover { background: #1a4a8a; }
.vi.now { border-color: #ff3030; }
.vi img { width: 68px; height: 38px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: #222; }
.vi-info { flex: 1; overflow: hidden; display: flex; align-items: center; gap: 5px; }
.vi-dot { width: 9px; height: 9px; border-radius: 50%; background: #334; flex-shrink: 0; transition: background .3s; border: 1px solid #445; }
.vi-dot.lit { background: #4caf50; box-shadow: 0 0 5px #4caf50; border-color: #4caf50; }
.vi-t { font-size: 9px; line-height: 1.3; color: #cce; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
.vi.dragging { opacity: 0.4; }
.vi.drag-over-item { border-top: 2px solid #e94560; }

/* Panel 3: Viewer */
#p3 { flex: 1; background: #111; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
#p3 .ph { display: flex; align-items: center; gap: 8px; }
#v-title { flex: 1; font-size: 11px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#v-nav { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
#v-nav button { padding: 2px 8px; background: #e94560; border: none; color: #fff; border-radius: 3px; cursor: pointer; }
#v-pageinfo { font-size: 10px; color: #aac; }
#v-canvas-wrap { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 10px; background: #1a1a1a; touch-action: pan-x pan-y; }
#v-canvas-wrap canvas { box-shadow: 0 4px 24px rgba(0,0,0,0.9); }
#v-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #334; font-size: 13px; text-align: center; line-height: 2.2; }

/* Settings */
#settings-btn { margin-left: auto; padding: 4px 10px; background: #0f3460; border: 1px solid #2a4a8a; color: #aac; border-radius: 4px; cursor: pointer; font-size: 10px; flex-shrink: 0; }
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
#modal-overlay.show { display: flex; }
#modal { background: #16213e; border-radius: 10px; padding: 20px; width: 440px; border: 1px solid #0f3460; max-width: 95vw; }
#modal h3 { color: #e94560; margin-bottom: 12px; }
#modal label { font-size: 11px; color: #aac; display: block; margin-bottom: 4px; margin-top: 10px; }
#modal input { width: 100%; padding: 7px; border-radius: 4px; border: 1px solid #0f3460; background: #080818; color: #eee; font-size: 11px; margin-bottom: 4px; }
#login-status { font-size: 10px; color: #aac; margin-bottom: 8px; min-height: 16px; }
#modal .btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
#modal .btns button { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
#btn-save-settings { background: #e94560; color: #fff; }
#btn-close-modal { background: #333; color: #eee; }
#btn-google-login { width: 100%; padding: 8px; background: #4285f4; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 6px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>
<header>
  <h1>🎼 楽譜 × YouTube 連動アプリ</h1>
  <span id="login-info" style="font-size:10px;color:#4caf50;"></span>
  <button id="settings-btn">⚙ 設定</button>
</header>

<div id="modal-overlay">
  <div id="modal">
    <h3>⚙ 設定</h3>
    <label>YouTube Data API v3 キー</label>
    <input id="input-apikey" type="text" placeholder="AIzaSy...">
    <label>Google OAuth クライアントID</label>
    <input id="input-clientid" type="text" placeholder="xxx.apps.googleusercontent.com">
    <div id="login-status"></div>
    <button id="btn-google-login">🔑 Googleアカウントでログイン（Drive連携）</button>
    <label>追加済みプレイリスト</label>
    <div id="modal-pl-list" style="font-size:10px;color:#aac;margin-bottom:4px;max-height:80px;overflow-y:auto;"></div>
    <div class="btns">
      <button id="btn-close-modal">閉じる</button>
      <button id="btn-save-settings">保存</button>
    </div>
  </div>
</div>

<div class="main">
  <!-- Panel 1: PDF -->
  <div id="p1" class="panel">
    <div class="ph">
      <span id="p1-label">📄 楽譜 <span id="pdf-count" style="color:#e94560;font-size:10px;font-weight:normal;"></span></span>
      <button class="collapse-btn" id="p1-collapse-btn">▽</button>
    </div>
    <div id="p1-body">
      <div id="pdf-toolbar">
        <button id="btn-sort-name">あ順</button>
        <button id="btn-sort-date">日付順</button>
        <button id="btn-check-all">全選択</button>
        <button id="btn-uncheck-all">全解除</button>
        <button id="btn-reload-drive">🔄</button>
      </div>
      <div id="pdf-list"><div class="hint">Googleログイン後<br>自動で読み込まれます</div></div>
    </div>
  </div>

  <!-- Panel 2: YouTube -->
  <div id="p2" class="panel">
    <div class="ph">
      <span id="p2-label">▶ YouTube <span id="pl-count" style="color:#e94560;font-size:10px;font-weight:normal;"></span></span>
      <button class="collapse-btn" id="p2-collapse-btn">▽</button>
    </div>
    <div id="p2-body">
      <div id="yt-wrap"><div id="player"></div></div>
      <div class="now-bar" id="now-title">再生停止中</div>
      <div id="yt-ctrl">
        <button id="btn-prev-t">⏮</button>
        <button id="btn-play">▶ 再生</button>
        <button id="btn-next-t">⏭</button>
        <button id="btn-stop">⏹</button>
      </div>
      <div id="pl-area">
        <input id="pl-url" type="text" placeholder="プレイリストURL を貼り付け＋Enter">
        <button id="btn-add">＋ プレイリストを追加</button>
        <div id="pl-status"></div>
      </div>
      <div id="yt-vlist"><div class="hint">プレイリストURLを追加すると<br>動画一覧が表示されます<br><span style="color:#4caf50">●</span>=楽譜と一致</div></div>
    </div>
  </div>

  <!-- Panel 3: Viewer -->
  <div id="p3" class="panel">
    <div class="ph">
      📖 <span id="v-title">楽譜を選択してください</span>
      <div id="v-nav" style="display:none">
        <button id="btn-prev">◀</button>
        <span id="v-pageinfo"></span>
        <button id="btn-next">▶</button>
      </div>
    </div>
    <div id="v-canvas-wrap" style="display:none"><canvas id="v-canvas"></canvas></div>
    <div id="v-empty">← 楽譜パネルからPDFを選択<br>または動画を再生すると自動表示</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// =====================================================================
// STATE
// =====================================================================
const S = {
  apiKey: '', clientId: '', accessToken: null,
  pdfs: [], activePdf: null, curPage: 1, totalPages: 1,
  sortMode: 'name',
  playlists: [],
  player: null, ready: false,
  playingVid: null, playingTitle: '',
  pollTimer: null,
  queue: [], matchQueue: [],
  qIdx: -1, matchQIdx: -1,
  isMatchPlay: false,
  p1collapsed: false, p2collapsed: false,
  driveRootId: null, driveOrderFileId: null,
  hasInitialCue: false, // 起動後初回キュー済みフラグ
  retryCount: 0,
};

// =====================================================================
// COLLAPSE
// =====================================================================
async function redrawIfNeeded() {
  if (S.activePdf !== null && S.pdfs[S.activePdf]?.pdfDoc) {
    await new Promise(r => setTimeout(r, 350)); // transition待ち
    await drawPage(S.pdfs[S.activePdf].pdfDoc, S.curPage);
  }
}

document.getElementById('p1-collapse-btn').addEventListener('click', async () => {
  S.p1collapsed = !S.p1collapsed;
  document.getElementById('p1').classList.toggle('collapsed', S.p1collapsed);
  document.getElementById('p1-collapse-btn').classList.toggle('collapsed', S.p1collapsed);
  await redrawIfNeeded();
});
document.getElementById('p2-collapse-btn').addEventListener('click', async () => {
  S.p2collapsed = !S.p2collapsed;
  document.getElementById('p2').classList.toggle('collapsed', S.p2collapsed);
  document.getElementById('p2-collapse-btn').classList.toggle('collapsed', S.p2collapsed);
  await redrawIfNeeded();
});

// =====================================================================
// SETTINGS
// =====================================================================
document.getElementById('settings-btn').addEventListener('click', () => {
  document.getElementById('input-apikey').value = S.apiKey;
  document.getElementById('input-clientid').value = S.clientId;
  updateLoginStatus();
  renderModalPlList();
  document.getElementById('modal-overlay').classList.add('show');
});
document.getElementById('btn-close-modal').addEventListener('click', () => document.getElementById('modal-overlay').classList.remove('show'));
document.getElementById('btn-save-settings').addEventListener('click', () => {
  S.apiKey = document.getElementById('input-apikey').value.trim();
  S.clientId = document.getElementById('input-clientid').value.trim();
  saveState();
  document.getElementById('modal-overlay').classList.remove('show');
  setStatus('✅ 設定を保存しました');
});
function renderModalPlList() {
  const el = document.getElementById('modal-pl-list');
  el.innerHTML = S.playlists.length ? S.playlists.map(p => `• ${p.title}（${p.videos.length}件）`).join('<br>') : '（なし）';
}
function updateLoginStatus() {
  const el = document.getElementById('login-status');
  el.style.color = S.accessToken ? '#4caf50' : '#e94560';
  el.textContent = S.accessToken ? '✅ Googleログイン済み' : '❌ 未ログイン';
}

// =====================================================================
// GOOGLE OAuth
// =====================================================================
document.getElementById('btn-google-login').addEventListener('click', () => {
  if (!S.clientId) { S.clientId = document.getElementById('input-clientid').value.trim(); }
  if (!S.clientId) { alert('クライアントIDを入力してください'); return; }
  const scope = 'https://www.googleapis.com/auth/drive.readonly';
  const redirectUri = window.location.origin;
  const params = new URLSearchParams({
    client_id: S.clientId, redirect_uri: redirectUri,
    response_type: 'token', scope, include_granted_scopes: 'true',
  });
  const popup = window.open('https://accounts.google.com/o/oauth2/v2/auth?' + params, 'google-auth', 'width=500,height=600');
  const timer = setInterval(() => {
    try {
      if (!popup || popup.closed) { clearInterval(timer); return; }
      const url = popup.location.href;
      if (url.includes('access_token')) {
        const hash = new URLSearchParams(popup.location.hash.substring(1));
        S.accessToken = hash.get('access_token');
        popup.close(); clearInterval(timer); onLoggedIn();
      }
    } catch(e) {}
  }, 500);
});

async function onLoggedIn() {
  document.getElementById('login-info').textContent = '✅ Drive連携済み';
  updateLoginStatus();
  await syncDrivePdfs();
}

// =====================================================================
// GOOGLE DRIVE - PDF同期
// =====================================================================
async function driveGet(url) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + S.accessToken } });
  if (!r.ok) throw new Error('Drive API error: ' + r.status);
  return r.json();
}

async function syncDrivePdfs() {
  try {
    document.getElementById('pdf-list').innerHTML = '<div class="hint">同期中...</div>';

    // ScorePlayerフォルダを探す
    const q = encodeURIComponent(`name='ScorePlayer' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const root = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
    if (!root.files.length) { alert('ScorePlayerフォルダが見つかりません'); return; }
    const rootId = root.files[0].id;

    // ScorePlayer/score フォルダを探す
    const q2 = encodeURIComponent(`name='score' and mimeType='application/vnd.google-apps.folder' and '${rootId}' in parents and trashed=false`);
    const scoreDir = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${q2}&fields=files(id,name)`);
    if (!scoreDir.files.length) { alert('ScorePlayer/score フォルダが見つかりません'); return; }
    const scoreId = scoreDir.files[0].id;

    // score以下のPDFを取得（直下＋1層のサブフォルダ）
    const driveFiles = [];

    // score直下のPDF
    const qPdf = encodeURIComponent(`'${scoreId}' in parents and mimeType='application/pdf' and trashed=false`);
    const direct = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${qPdf}&fields=files(id,name,modifiedTime)&orderBy=name`);
    driveFiles.push(...direct.files);

    // score直下のサブフォルダ
    const qSub = encodeURIComponent(`'${scoreId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const subs = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${qSub}&fields=files(id,name)&orderBy=name`);
    for (const sub of subs.files) {
      const qSubPdf = encodeURIComponent(`'${sub.id}' in parents and mimeType='application/pdf' and trashed=false`);
      const subPdfs = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${qSubPdf}&fields=files(id,name,modifiedTime)&orderBy=name`);
      driveFiles.push(...subPdfs.files);
    }

    // playlist_order.jsonを読み込む
    await loadPlaylistOrder(rootId);

    // 保存済みチェック状態を読み込む
    const savedChecks = loadCheckedState();

    // 既存PDFのfileId→pdfDocマップ
    const existingDocs = {};
    S.pdfs.forEach(p => { if (p.pdfDoc) existingDocs[p.fileId] = p.pdfDoc; });

    // 新しいPDFリストを構築
    const newPdfs = [];
    for (const file of driveFiles) {
      const name = file.name.replace(/\.pdf$/i, '');
      const wasKnown = name in savedChecks;
      newPdfs.push({
        name, fileId: file.id, modifiedTime: file.modifiedTime,
        pdfDoc: existingDocs[file.id] || null,
        checked: wasKnown ? savedChecks[name] : false,
        isNew: !wasKnown,
      });
    }

    S.pdfs = newPdfs;
    S.driveRootId = rootId;
    sortPdfs();
    saveCheckedState();
    renderPdfList();
    renderVlist();
    loadAllPdfDocs();

  } catch(e) { alert('Drive同期エラー: ' + e.message); }
}

// フォルダを再帰的にスキャンしてPDFを収集
async function scanFolderRecursive(folderId) {
  let results = [];

  // このフォルダ内のPDFを取得
  const qPdf = encodeURIComponent(`'${folderId}' in parents and mimeType='application/pdf' and trashed=false`);
  const pdfs = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${qPdf}&fields=files(id,name,modifiedTime)&orderBy=name`);
  results = results.concat(pdfs.files);

  // サブフォルダを取得して再帰
  const qDir = encodeURIComponent(`'${folderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const dirs = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${qDir}&fields=files(id,name)&orderBy=name`);
  for (const dir of dirs.files) {
    const sub = await scanFolderRecursive(dir.id);
    results = results.concat(sub);
  }

  return results;
}

async function loadAllPdfDocs() {
  for (const pdf of S.pdfs) {
    if (pdf.pdfDoc) continue;
    try {
      const r = await fetch(`https://www.googleapis.com/drive/v3/files/${pdf.fileId}?alt=media`, {
        headers: { Authorization: 'Bearer ' + S.accessToken }
      });
      const ab = await r.arrayBuffer();
      pdf.pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
      // アクティブなPDFが読み込まれたら表示を更新
      if (S.activePdf !== null && S.pdfs[S.activePdf]?.name === pdf.name) {
        await showPdf(S.activePdf);
      }
    } catch(e) { console.warn('PDF読込失敗:', pdf.name, e); }
  }
  // 全PDF読み込み完了後にmatchQueueを再構築・リスト更新
  buildQueue();
  cueFirstVideo(); // 初回のみキュー
  renderPdfList();
  renderVlist();
  setStatus('✅ 楽譜の読み込み完了');
  setTimeout(() => setStatus(''), 3000);
}

// =====================================================================
// PLAYLIST ORDER - Google Drive同期
// =====================================================================
async function loadPlaylistOrder(rootId) {
  try {
    // playlist_order.jsonを探す
    const q = encodeURIComponent(`name='playlist_order.json' and '${rootId}' in parents and trashed=false`);
    const res = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
    if (!res.files.length) return; // ファイルなければスキップ

    const fileId = res.files[0].id;
    S.driveOrderFileId = fileId;

    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: 'Bearer ' + S.accessToken }
    });
    const json = await r.json();

    // 保存された順番をプレイリストに適用
    if (json.playlists) {
      // 既存プレイリストに順番を適用
      json.playlists.forEach(saved => {
        const pl = S.playlists.find(p => p.id === saved.id);
        if (!pl) return;
        // 保存された順番で動画を並び替え
        const ordered = [];
        saved.videoIds.forEach(vid => {
          const v = pl.videos.find(x => x.videoId === vid);
          if (v) ordered.push(v);
        });
        // 順番に含まれていない動画は末尾に追加
        pl.videos.forEach(v => {
          if (!ordered.find(x => x.videoId === v.videoId)) ordered.push(v);
        });
        pl.videos = ordered;
      });
      buildQueue();
      renderVlist();
    }
  } catch(e) { console.warn('playlist_order.json読込失敗:', e); }
}

async function savePlaylistOrder() {
  if (!S.driveRootId || !S.accessToken) return;
  try {
    const data = {
      updatedAt: new Date().toISOString(),
      playlists: S.playlists.map(pl => ({
        id: pl.id,
        title: pl.title,
        videoIds: pl.videos.map(v => v.videoId),
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });

    if (S.driveOrderFileId) {
      // 既存ファイルを更新
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${S.driveOrderFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + S.accessToken, 'Content-Type': 'application/json' },
        body: blob,
      });
    } else {
      // 新規作成
      const meta = JSON.stringify({ name: 'playlist_order.json', parents: [S.driveRootId] });
      const form = new FormData();
      form.append('metadata', new Blob([meta], { type: 'application/json' }));
      form.append('file', blob);
      const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + S.accessToken },
        body: form,
      });
      const j = await r.json();
      S.driveOrderFileId = j.id;
    }
  } catch(e) { console.warn('playlist_order.json保存失敗:', e); }
}

window.onYouTubeIframeAPIReady = () => {
  S.player = new YT.Player('player', {
    width: '275', height: '155',
    playerVars: { autoplay: 0, controls: 1, rel: 0, modestbranding: 1 },
    events: {
      onReady: () => {
        S.ready = true;
        document.getElementById('now-title').textContent = '準備完了 — 再生できます';
        setTimeout(() => {
          if (document.getElementById('now-title').textContent === '準備完了 — 再生できます')
            document.getElementById('now-title').textContent = '再生停止中';
        }, 3000);
        restoreState();
      },
      onStateChange: e => {
        if (e.data === YT.PlayerState.PLAYING) startPoll();
        else if (e.data === YT.PlayerState.ENDED) { stopPoll(); playNext(); }
        else if ([YT.PlayerState.PAUSED, YT.PlayerState.STOPPED].includes(e.data)) stopPoll();
      },
      onError: e => {
        // エラー時の再生情報をキャプチャ
        const isMatch = S.isMatchPlay;
        const mIdx = S.matchQIdx;
        const qIdx = S.qIdx;
        if (S.retryCount === undefined) S.retryCount = 0;
        if (S.retryCount < 2) {
          S.retryCount++;
          setTimeout(() => {
            try {
              if (isMatch && S.matchQueue[mIdx]) {
                S.player.loadVideoById({ videoId: S.matchQueue[mIdx].videoId, startSeconds: 0 });
                startPoll();
              } else if (!isMatch && S.queue[qIdx]) {
                S.player.loadVideoById({ videoId: S.queue[qIdx].videoId, startSeconds: 0 });
                startPoll();
              }
            } catch(err) { console.warn('再試行失敗:', err); }
          }, 500);
        } else {
          S.retryCount = 0;
          setStatus('⚠ 再生エラー。動画の埋め込みが制限されている可能性があります');
        }
      }
    }
  });
};
(()=>{ const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s); })();

function startPoll() { stopPoll(); checkNow(); S.pollTimer = setInterval(checkNow, 1200); }
function stopPoll() { if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; } }

function checkNow() {
  if (!S.player || typeof S.player.getVideoData !== 'function') return;
  try {
    const d = S.player.getVideoData();
    if (!d || !d.video_id) return;
    const vid = d.video_id, title = d.title || '';
    document.getElementById('now-title').textContent = title || '再生停止中';
    if (vid !== S.playingVid || title !== S.playingTitle) {
      S.playingVid = vid; S.playingTitle = title;
      const idx = S.queue.findIndex(v => v.videoId === vid);
      if (idx >= 0) S.qIdx = idx;
      const midx = S.matchQueue.findIndex(v => v.videoId === vid);
      if (midx >= 0) S.matchQIdx = midx;
      markVid(vid); autoShowPdf(title);
    }
  } catch(e) {}
}

function markVid(vid) {
  document.querySelectorAll('.vi').forEach(el => el.classList.toggle('now', el.dataset.vid === vid));
}
function autoShowPdf(title) {
  const idx = matchPdf(title);
  if (idx !== null) showPdf(idx); else clearViewer();
}

// =====================================================================
// QUEUE（マッチした曲のみ）
// =====================================================================
function buildQueue() {
  S.queue = S.playlists.flatMap(p => p.videos);
  S.matchQueue = S.queue.filter(v => matchPdf(v.title) !== null);
  S.matchQIdx = -1;
}

// プレーヤーに最初の動画をキューしておく（YouTube標準UI対策・1回だけ）
function cueFirstVideo() {
  if (!S.ready || !S.player || !S.queue.length) return;
  if (S.hasInitialCue) return; // 既にキュー済みならスキップ
  const firstVid = S.matchQueue.length ? S.matchQueue[0].videoId : S.queue[0].videoId;
  S.player.cueVideoById(firstVid);
  S.hasInitialCue = true;
}

function playMatchByIdx(idx) {
  if (idx < 0 || idx >= S.matchQueue.length) return;
  if (!S.ready || !S.player || typeof S.player.loadVideoById !== 'function') {
    setStatus('⚠ プレーヤー準備中です。しばらくお待ちください');
    return;
  }
  S.matchQIdx = idx;
  S.isMatchPlay = true;
  S.player.loadVideoById({ videoId: S.matchQueue[idx].videoId, startSeconds: 0 });
  startPoll();
}

function playByIdx(idx) {
  if (idx < 0 || idx >= S.queue.length) return;
  if (!S.ready || !S.player || typeof S.player.loadVideoById !== 'function') {
    setStatus('⚠ プレーヤー準備中です。しばらくお待ちください');
    return;
  }
  S.qIdx = idx;
  S.isMatchPlay = false;
  S.player.loadVideoById({ videoId: S.queue[idx].videoId, startSeconds: 0 });
  startPoll();
}

function playNext() {
  if (!S.isMatchPlay) return; // サムネイルクリック時は次に進まない
  if (S.matchQIdx < S.matchQueue.length - 1) playMatchByIdx(S.matchQIdx + 1);
  else { // リスト最後で止まる
    S.isMatchPlay = false;
    S.player.stopVideo();
    stopPoll();
    document.getElementById('now-title').textContent = '再生終了';
  }
}

function playPrev() {
  if (S.matchQIdx > 0) playMatchByIdx(S.matchQIdx - 1);
}

document.getElementById('btn-play').addEventListener('click', () => {
  if (!S.ready) return;
  // 一時停止中なら再開
  if (S.player.getPlayerState() === YT.PlayerState.PAUSED && S.isMatchPlay) {
    S.player.playVideo(); startPoll(); return;
  }
  // マッチキューを再構築
  buildQueue();

  if (!S.matchQueue.length) {
    if (S.pdfs.length === 0) { setStatus('⚠ 楽譜の読み込み中です'); return; }
    const allLoaded = S.pdfs.every(p => p.pdfDoc !== null);
    if (!allLoaded) { setStatus('⚠ 楽譜を読み込み中です。少し待ってから再度押してください'); return; }
    const hasChecked = S.pdfs.some(p => p.checked);
    if (!hasChecked) { setStatus('⚠ 楽譜にチェックを入れてください'); return; }
    setStatus('⚠ マッチする曲がありません'); return;
  }

  // 直前に再生していた曲がマッチキューにあればそこから、なければ先頭から
  let startIdx = 0;
  if (S.playingVid) {
    const idx = S.matchQueue.findIndex(v => v.videoId === S.playingVid);
    if (idx >= 0) startIdx = idx;
  }
  S.retryCount = 0; // 再試行カウントリセット
  playMatchByIdx(startIdx);
});

});

function getListId(url) { try { return new URL(url.trim()).searchParams.get('list'); } catch { return null; } }
function setStatus(msg) { document.getElementById('pl-status').textContent = msg; }

async function fetchAllVideos(listId) {
  let videos=[], pageToken='';
  do {
    const url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${listId}&key=${S.apiKey}${pageToken?'&pageToken='+pageToken:''}`;
    const r=await fetch(url); const j=await r.json();
    if (j.error) throw new Error(j.error.message);
    j.items?.forEach(item => {
      const vid=item.snippet?.resourceId?.videoId, title=item.snippet?.title;
      const thumb=item.snippet?.thumbnails?.medium?.url||`https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
      if (vid&&title&&title!=='Deleted video'&&title!=='Private video') videos.push({videoId:vid,title,thumb});
    });
    pageToken=j.nextPageToken||'';
  } while(pageToken);
  return videos;
}

async function fetchPlaylistTitle(listId) {
  const r=await fetch(`https://www.googleapis.com/youtube/v3/playlists?part=snippet&id=${listId}&key=${S.apiKey}`);
  const j=await r.json(); return j.items?.[0]?.snippet?.title||'プレイリスト';
}

async function addPlaylist(rawUrl) {
  const lid=getListId(rawUrl);
  if (!lid) { setStatus('❌ 正しいプレイリストURLではありません'); return; }
  if (S.playlists.find(p=>p.id===lid)) { setStatus('⚠ すでに追加済みです'); return; }
  if (!S.apiKey) { setStatus('❌ APIキーが未設定です'); return; }
  setStatus('⏳ 読み込み中...');
  try {
    const [plTitle,videos]=await Promise.all([fetchPlaylistTitle(lid),fetchAllVideos(lid)]);
    S.playlists.push({id:lid,title:plTitle,videos}); buildQueue();
    setStatus(`✅ ${plTitle}（${videos.length}件）`);
    saveState(); savePlaylistOrder(); renderVlist(); updatePlCount();
  } catch(e) { setStatus('❌ 取得エラー: '+e.message); }
}

function delPlaylist(lid) {
  S.playlists=S.playlists.filter(p=>p.id!==lid); buildQueue(); S.qIdx=-1;
  if (S.ready) S.player.stopVideo(); stopPoll();
  saveState(); savePlaylistOrder(); renderVlist(); updatePlCount();
}

let dragSrcVid=null;
function renderVlist() {
  const el=document.getElementById('yt-vlist'); el.innerHTML='';
  if (!S.playlists.length) {
    el.innerHTML='<div class="hint">プレイリストURLを追加すると<br>動画一覧が表示されます<br><span style="color:#4caf50">●</span>=楽譜と一致</div>';
    return;
  }
  S.playlists.forEach((pl,plIdx)=>{
    const hdr=document.createElement('div'); hdr.className='pl-header';
    const ts=document.createElement('span'); ts.style.cssText='overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1'; ts.textContent=pl.title;
    const db=document.createElement('button'); db.className='pl-del'; db.textContent='削除';
    db.addEventListener('click',()=>{ if(confirm(`「${pl.title}」を削除しますか？`)) delPlaylist(pl.id); });
    hdr.appendChild(ts); hdr.appendChild(db); el.appendChild(hdr);
    pl.videos.forEach((v,vIdx)=>{
      const d=document.createElement('div'); d.className='vi'; d.dataset.vid=v.videoId; d.draggable=true;
      if (v.videoId===S.playingVid) d.classList.add('now');
      const isHit=matchPdf(v.title)!==null;
      d.innerHTML=`<img src="${v.thumb}" loading="lazy" onerror="this.style.display='none'"><div class="vi-info"><span class="vi-dot${isHit?' lit':''}"></span><div class="vi-t">${esc(v.title)}</div></div>`;
      // サムネイルクリック→単曲再生（連続再生なし）
      d.addEventListener('click',()=>{
        if(!S.ready) return;
        const idx=S.queue.findIndex(q=>q.videoId===v.videoId);
        if(idx>=0) playByIdx(idx);
      });
      d.addEventListener('dragstart',e=>{ dragSrcVid={plIdx,vIdx}; d.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
      d.addEventListener('dragend',()=>d.classList.remove('dragging'));
      d.addEventListener('dragover',e=>{ e.preventDefault(); d.classList.add('drag-over-item'); });
      d.addEventListener('dragleave',()=>d.classList.remove('drag-over-item'));
      d.addEventListener('drop',e=>{ e.preventDefault(); e.stopPropagation(); d.classList.remove('drag-over-item');
        if (!dragSrcVid||dragSrcVid.plIdx!==plIdx) return;
        const arr=S.playlists[plIdx].videos; const [moved]=arr.splice(dragSrcVid.vIdx,1); arr.splice(vIdx,0,moved);
        buildQueue(); saveState(); savePlaylistOrder(); renderVlist(); });
      el.appendChild(d);
    });
  });
}

async function drawPage(pdfDoc,pageNum) {
  const wrap=document.getElementById('v-canvas-wrap'), canvas=document.getElementById('v-canvas');
  const aw=wrap.clientWidth-20, ah=wrap.clientHeight-20;
  const page=await pdfDoc.getPage(pageNum);
  const vp0=page.getViewport({scale:1});
  const scale=Math.min(aw/vp0.width,ah/vp0.height,3)*(window._zoomScale||1);
  const vp=page.getViewport({scale});
  canvas.width=vp.width; canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  document.getElementById('v-pageinfo').textContent=`${pageNum} / ${S.totalPages}`;
}

// =====================================================================
// MATCHING（チェック済みPDFのみ）
// =====================================================================
function norm(s) {
  return (s||'').toLowerCase()
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/[\s　・＝\-_～〜「」【】『』()（）♪\/／]/g,'');
}
function lcs(a,b) {
  let max=0;
  for(let i=0;i<a.length;i++) for(let j=0;j<b.length;j++){
    let len=0; while(i+len<a.length&&j+len<b.length&&a[i+len]===b[j+len])len++;
    if(len>max)max=len;
  }
  return max;
}
function minMatch(pn){return pn.length<4?pn.length:4;}

// 動画タイトル → チェック済みPDFのインデックス
function matchPdf(videoTitle) {
  const vn=norm(videoTitle); let best=null,bestLen=0;
  S.pdfs.forEach((p,i)=>{
    if (!p.checked) return;
    const pn=norm(p.name); if(!pn.length)return;
    const c=lcs(pn,vn); if(c>=minMatch(pn)&&c>bestLen){bestLen=c;best=i;}
  });
  return best;
}

// PDF名 → チェック済みかどうかに関わらずマッチ確認（LED用）
function matchPdf2(pdfName) {
  const pn=norm(pdfName); const min=minMatch(pn);
  for (const pl of S.playlists) {
    for (const v of pl.videos) {
      if (lcs(pn,norm(v.title))>=min) return true;
    }
  }
  return null;
}

function autoPlayForPdf(pdfName) {
  if(!S.ready)return; const pn=norm(pdfName),min=minMatch(pn); let bestIdx=-1,bestLen=0;
  S.queue.forEach((v,i)=>{ const c=lcs(pn,norm(v.title)); if(c>=min&&c>bestLen){bestLen=c;bestIdx=i;} });
  if(bestIdx>=0)playByIdx(bestIdx);
}

// =====================================================================
// STATE PERSISTENCE
// =====================================================================
function saveState() {
  try {
    localStorage.setItem('scoreapp_v4', JSON.stringify({
      apiKey:S.apiKey, clientId:S.clientId,
      playlists:S.playlists, sortMode:S.sortMode,
    }));
  } catch(e){}
}
function restoreState() {
  try {
    const raw=localStorage.getItem('scoreapp_v4'); if(!raw)return;
    const data=JSON.parse(raw);
    if(data.apiKey)S.apiKey=data.apiKey;
    if(data.clientId)S.clientId=data.clientId;
    if(data.sortMode)S.sortMode=data.sortMode;
    if(data.playlists?.length){S.playlists=data.playlists;buildQueue();renderVlist();updatePlCount();}
  } catch(e){}
}

// =====================================================================
// PINCH ZOOM
// =====================================================================
(()=>{
  const wrap=document.getElementById('v-canvas-wrap');
  let zoomScale=1, lastDist=0, pinching=false, renderTimer=null;
  window._zoomScale=1;
  window._zoomReset=()=>{zoomScale=1;window._zoomScale=1;};

  function getDist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}

  async function rerender(){
    if(S.activePdf===null)return;
    const pdf=S.pdfs[S.activePdf]; if(!pdf.pdfDoc)return;
    await drawPage(pdf.pdfDoc,S.curPage);
  }

  wrap.addEventListener('touchstart',e=>{if(e.touches.length===2){pinching=true;lastDist=getDist(e.touches);e.preventDefault();}},{passive:false});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinching){
      e.preventDefault();
      const dist=getDist(e.touches);
      zoomScale=Math.min(Math.max(zoomScale*(dist/lastDist),0.5),5);
      window._zoomScale=zoomScale; lastDist=dist;
      if(renderTimer)clearTimeout(renderTimer);
      renderTimer=setTimeout(rerender,80);
    }
  },{passive:false});
  wrap.addEventListener('touchend',e=>{if(e.touches.length<2){pinching=false;lastDist=0;}});

  let lastTap=0;
  wrap.addEventListener('touchend',e=>{
    if(pinching)return;
    const now=Date.now();
    if(now-lastTap<300){e.preventDefault();zoomScale=1;window._zoomScale=1;rerender();}
    lastTap=now;
  });
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    zoomScale=Math.min(Math.max(zoomScale*(e.deltaY>0?0.9:1.1),0.5),5);
    window._zoomScale=zoomScale;
    if(renderTimer)clearTimeout(renderTimer);
    renderTimer=setTimeout(rerender,80);
  },{passive:false});
})();

// DRAG & DROP（ローカルPDF追加）
// =====================================================================
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{
  const txt=e.dataTransfer.getData('text/plain')||'';
  if(txt.includes('youtube.com/playlist')){e.preventDefault();addPlaylist(txt);}
});

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
